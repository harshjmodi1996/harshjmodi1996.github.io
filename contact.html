<html lang="en-US">
<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Harsh Modi</title>
  <meta name="description" content="Get in touch with Harsh Modi, PhD candidate in Mechanical Engineering / Robotics at Texas A&amp;M University.">
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Get In Touch</span>
        <h1>Contact</h1>
        <p>Feel free to reach out about research collaborations, opportunities, or questions about my work.</p>
      </div>
    </section>

    <section class="section" data-fade>
      <div class="container">
        <div class="card">
          <div class="card-body contact-grid">
            <form action="https://formspree.io/f/xrgnkyar" method="POST">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
              </div>
              <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="Subject" placeholder="Subject" required>
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" placeholder="you@example.com" required>
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message" required></textarea>
              </div>
              <button class="btn btn-primary" type="submit">Send Message</button>
            </form>

            <dl class="contact-info">
              <dt>Address</dt>
              <dd>ControlRobot Lab, Texas A&amp;M University, College Station, TX, USA</dd>
              <dt>Email</dt>
              <dd><a href="mailto:harsh.modi@tamu.edu">harsh.modi@tamu.edu</a></dd>
              <dt>Elsewhere</dt>
              <dd class="social-row" id="hero-social" style="margin-top:8px;"></dd>
            </dl>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
</body>
